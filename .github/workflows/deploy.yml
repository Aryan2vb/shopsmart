name: 04 Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Update project directory with Rubric 10 Idempotency
            if [ ! -d "/home/${{ secrets.EC2_USERNAME }}/shopsmart" ]; then
                mkdir -p /home/${{ secrets.EC2_USERNAME }}/shopsmart
                cd /home/${{ secrets.EC2_USERNAME }}
                # Assuming the user has set up git credentials or uses public repo
                git clone https://github.com/${{ github.repository }}.git shopsmart || true
            fi

            cd /home/${{ secrets.EC2_USERNAME }}/shopsmart
            git pull origin main

            # 2. Setup Server (Rubric 3/4)
            cd server
            npm install

            # 3. Start/Restart with PM2 (Rubric 10 Idempotency)
            if ! command -v pm2 &> /dev/null; then
                sudo npm install -g pm2
            fi

            if pm2 describe shopsmart-server > /dev/null; then
                pm2 restart shopsmart-server
            else
                pm2 start index.js --name shopsmart-server
            fi
            pm2 save

            # 4. Build Frontend (Rubric 3)
            cd ../client
            npm install
            npm run build

            # 5. Serve with Nginx (Rubric 9 Deployment)
            # Ensure the directory exists
            sudo mkdir -p /var/www/html
            sudo cp -r dist/* /var/www/html/
            
            # Restart Nginx to ensure it's healthy
            sudo systemctl restart nginx || true

            echo "Deployment completed successfully."
