name: AWS ECS Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

jobs:
  tests:
    name: Phase 1 - Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Prepare test report directory
        run: mkdir -p test-results

      - name: Run backend unit tests
        working-directory: server
        run: npm test -- --ci --json --outputFile=../test-results/backend-jest.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run frontend unit and integration tests
        working-directory: client
        run: npm test -- --reporter=default --reporter=junit --outputFile=../test-results/frontend-vitest.xml

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start integration stack
        run: docker compose up -d --build

      - name: Run integration tests
        run: npx playwright test --reporter=list,junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/playwright-junit.xml

      - name: Stop integration stack
        if: always()
        run: docker compose down

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-results/

  terraform:
    name: Phase 2 - Terraform
    needs: tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ecr_repository_url: ${{ steps.tf-output.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf-output.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf-output.outputs.ecs_service_name }}
      alb_dns_name: ${{ steps.tf-output.outputs.alb_dns_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Discover and Auto-Import existing resources
        working-directory: terraform
        run: |
          echo "Checking for existing resources to auto-import..."
          # Calculate the deterministic resource name from Terraform
          NAME=$(echo 'local.name' | terraform console | tr -d '"')
          echo "Project Resource Name: $NAME"
          
          : > imports.tf

          add_import() {
            local address="$1"
            local id="$2"

            cat <<EOF >> imports.tf
          import {
            to = $address
            id = "$id"
          }

          EOF
          }

          # 1. S3 Bucket
          BUCKET_NAME="${NAME}-artifacts"
          OWNED_BUCKET=$(aws s3api list-buckets --query "Buckets[?Name=='${BUCKET_NAME}'].Name | [0]" --output text 2>/dev/null || echo "")
          if [ "$OWNED_BUCKET" = "$BUCKET_NAME" ]; then
            echo "Found existing S3 Bucket, adding to imports."
            add_import "aws_s3_bucket.artifacts" "$BUCKET_NAME"
          elif aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Found existing S3 Bucket, adding to imports."
            add_import "aws_s3_bucket.artifacts" "$BUCKET_NAME"
          fi
          
          # 2. ECR Repository
          if aws ecr describe-repositories --repository-names "shopsmart-server" 2>/dev/null; then
            echo "Found existing ECR Repo, adding to imports."
            add_import "aws_ecr_repository.app" "shopsmart-server"
          fi
          
          # 3. ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names "${NAME}-alb" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            echo "Found existing ALB, adding to imports."
            add_import "aws_lb.app" "$ALB_ARN"
          fi
          
          # 4. Target Group
          TG_ARN=$(aws elbv2 describe-target-groups --names "${NAME}-tg" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            echo "Found existing Target Group, adding to imports."
            add_import "aws_lb_target_group.app" "$TG_ARN"
          fi

          # 5. ALB Listener
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query 'Listeners[?Port==`80`].ListenerArn | [0]' --output text 2>/dev/null || echo "")
            if [ -n "$LISTENER_ARN" ] && [ "$LISTENER_ARN" != "None" ]; then
              echo "Found existing ALB Listener, adding to imports."
              add_import "aws_lb_listener.http" "$LISTENER_ARN"
            fi
          fi
          
          # 6. CloudWatch Log Group
          LOG_GROUP_NAME=$(aws logs describe-log-groups --log-group-name-prefix "/ecs/${NAME}" --query "logGroups[?logGroupName=='/ecs/${NAME}'].logGroupName | [0]" --output text 2>/dev/null || echo "")
          if [ "$LOG_GROUP_NAME" = "/ecs/${NAME}" ]; then
            echo "Found existing Log Group, adding to imports."
            add_import "aws_cloudwatch_log_group.app" "$LOG_GROUP_NAME"
          fi

          # 7. ECS Cluster
          ECS_CLUSTER_NAME=$(aws ecs describe-clusters --clusters "${NAME}-cluster" --query 'clusters[?status==`ACTIVE`].clusterName | [0]' --output text 2>/dev/null || echo "")
          if [ "$ECS_CLUSTER_NAME" = "${NAME}-cluster" ]; then
            echo "Found existing ECS Cluster, adding to imports."
            add_import "aws_ecs_cluster.main" "$ECS_CLUSTER_NAME"

            ECS_SERVICE_NAME=$(aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "${NAME}-service" --query 'services[?status!=`INACTIVE`].serviceName | [0]' --output text 2>/dev/null || echo "")
            if [ "$ECS_SERVICE_NAME" = "${NAME}-service" ]; then
              echo "Found existing ECS Service, adding to imports."
              add_import "aws_ecs_service.app" "${ECS_CLUSTER_NAME}/${ECS_SERVICE_NAME}"
            fi
          fi
          
          if [ -s imports.tf ]; then
            echo "Generated imports.tf content:"
            cat imports.tf
          else
            echo "No existing resources discovered for import."
          fi

          echo "Creating Terraform plan..."
          terraform plan -out=tfplan
      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf-output
        working-directory: terraform
        run: |
          ECR_URL=$(terraform output -raw ecr_repository_url)
          CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)
          SERVICE_NAME=$(terraform output -raw ecs_service_name)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          
          echo "ecr_repository_url=$ECR_URL" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$ALB_DNS" >> "$GITHUB_OUTPUT"
          
          echo "Successfully captured Terraform outputs."
          echo "ECR Repository URL: $ECR_URL"
  deploy-ecs:
    name: Phase 3 - Build, Push, Deploy ECS
    needs: terraform
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_REPOSITORY_URL" ]; then
            echo "Error: ECR_REPOSITORY_URL is empty. Check Phase 2 outputs."
            exit 1
          fi
          echo "Building image for repository: $ECR_REPOSITORY_URL with tag: $IMAGE_TAG"
          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" -t "$ECR_REPOSITORY_URL:latest" ./server
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY_URL:latest"

      - name: Update ECS task definition and service
        working-directory: terraform
        env:
          TF_VAR_container_image: ${{ needs.terraform.outputs.ecr_repository_url }}:${{ github.sha }}
          TF_VAR_desired_count: 1
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Verify ECS service rollout
        env:
          ECS_CLUSTER_NAME: ${{ needs.terraform.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ needs.terraform.outputs.ecs_service_name }}
        run: aws ecs wait services-stable --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME"

      - name: Verify service endpoint
        env:
          ALB_DNS_NAME: ${{ needs.terraform.outputs.alb_dns_name }}
        run: curl --fail --retry 12 --retry-delay 10 "http://$ALB_DNS_NAME/health"
